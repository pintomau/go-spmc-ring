name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Single source of truth: read the pinned Go version out of mise.toml
      # (Python 3.11+ ships tomllib in the stdlib; ubuntu-latest has it).
      - name: Read Go version from mise.toml
        id: tools
        run: |
          go=$(python3 -c "import tomllib;print(tomllib.load(open('mise.toml','rb'))['tools']['go'])")
          echo "go=$go" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.tools.outputs.go }}
          cache: true

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
