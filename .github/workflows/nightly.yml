name: Nightly thorough simulation

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC nightly
  workflow_dispatch:        # manual trigger (e.g. before a release)
    inputs:
      checks:
        description: 'Number of rapid cases per test'
        default: '5000'
        required: false

jobs:
  build-and-vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go build (cache128)
        run: go build -tags cache128 ./...

  simulation:
    needs: build-and-vet
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      RAPID_CHECKS: ${{ github.event.inputs.checks || '5000' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Run simulation tests
        run: go test -v -run Simulation -timeout 50m .

  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Run core benchmarks
        run: |
          go test -run '^$' -bench=. -benchtime=100ms -count=3 -benchmem 2>&1 | tee benchmark-output.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: nightly-benchmark-results
          path: benchmark-output.txt
