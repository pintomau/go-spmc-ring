name: Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  # github.workflow: this workflow type
  # github.event.pull_request.id: if this is a pull request, this pull request's id
  #   https://docs.github.com/developers/webhooks-and-events/webhooks/webhook-events-and-payloads#pull_request
  group: "workflow = ${{ github.workflow }}, pr = ${{ github.event.pull_request.id }}"
  # we only want to cancel on pull_request
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Single source of truth: read the pinned tool versions out of mise.toml
      # (Python 3.11+ ships tomllib in the stdlib; ubuntu-latest has it).
      - name: Read tool versions from mise.toml
        id: tools
        run: |
          go=$(python3 -c "import tomllib;print(tomllib.load(open('mise.toml','rb'))['tools']['go'])")
          golangci=$(python3 -c "import tomllib;print(tomllib.load(open('mise.toml','rb'))['tools']['golangci-lint'])")
          echo "go=$go" >> "$GITHUB_OUTPUT"
          echo "golangci=v$golangci" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.tools.outputs.go }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ steps.tools.outputs.golangci }}
          args: --timeout=5m

      - name: go vet
        run: go vet ./...
